[monitor]
watchdog_interval=300
auto_recovery_max=2
safe_tools=Read,Glob,Grep,Agent,TaskCreate,TaskGet,TaskList,TaskUpdate
# Auto-approve non-safe tool permissions after timeout
# Set to false to deny and require manual handling instead
auto_approve_permissions=true
auto_approve_timeout=300
debug=false
marker_dir=/tmp/cc-monitor

[channel:wechat]
enabled=false
account=
target=

[channel:dingtalk]
enabled=false
webhook=
secret=

[channel:feishu]
enabled=false
webhook=

[input:wechat]
enabled=false
poll_interval=30
allowed_commands=继续,continue,停止,stop,状态,status
allowed_senders=
allowed_chats=
rate_limit_per_minute=10

[remote-input]
run_via=cron
pidfile=/tmp/cc-monitor/remote-input.pid
logfile=/tmp/cc-monitor/remote-input.log

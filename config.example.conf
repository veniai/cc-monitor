# cc-monitor 配置文件
# 两种模式二选一：direct（直连）或 openclaw（龙虾）

[monitor]
# 模式选择：direct 或 openclaw
mode=direct
watchdog_interval=300
auto_recovery_max=2
safe_tools=Read,Glob,Grep,Agent,TaskCreate,TaskGet,TaskList,TaskUpdate,NotebookEdit,ListMcpResourcesTool,ReadMcpResourceTool
# Recovery message sent to stuck sessions (default: detailed behavioral instructions)
# recovery_message=临时中断。恢复后读 TaskList 继续当前 task：有 skill 必须调 Skill tool 并严格按 skill 流程执行（不得 inline 替代）；单步过长可拆分但不跳过；已完成不重做
# AskUserQuestion waits indefinitely for IM response, no auto-answer
debug=false
marker_dir=/tmp/cc-monitor

# ===== 模式一：直连（不依赖龙虾）=====

# 强通知通道（手表/手环提醒）—— 固定钉钉，后续可扩展
[channel:dingtalk]
enabled=false
webhook=
secret=
# Keyword for DingTalk bot message filter
keyword=~

# ===== 模式二：龙虾（完整功能）=====
# 以下配置仅在 mode=openclaw 时生效

# IM 交互通道：微信（通过龙虾）
[channel:wechat]
enabled=false
openclaw_channel=openclaw-weixin
openclaw_account=
openclaw_target=

# IM 交互通道：飞书（通过龙虾）
[channel:feishu-openclaw]
enabled=false
openclaw_channel=feishu
openclaw_account=
openclaw_target=

# ===== 龙虾模式 Agent 配置 =====
[openclaw]
# 子 Agent（推荐）或 main
agent_mode=sub
agent_name=cc-monitor
agent_model=

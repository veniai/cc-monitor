# cc-monitor 配置文件
# 两种模式二选一：direct（直连）或 openclaw（龙虾）

[monitor]
# 模式选择：direct 或 openclaw
mode=direct
watchdog_interval=300
auto_recovery_max=2
safe_tools=Read,Glob,Grep,Agent,TaskCreate,TaskGet,TaskList,TaskUpdate
# Auto-approve non-safe tool permissions after timeout
# Set to false to deny and require manual handling instead
auto_approve_permissions=true
auto_approve_timeout=300
debug=false
marker_dir=/tmp/cc-monitor

# ===== 模式一：直连（不依赖龙虾）=====

# 强通知通道（手表/手环提醒）—— 固定钉钉，后续可扩展
[channel:dingtalk]
enabled=false
webhook=
secret=

# IM 通知通道（直连模式用 webhook）
[channel:feishu]
enabled=false
webhook=

# ===== 模式二：龙虾（完整功能）=====
# 以下配置仅在 mode=openclaw 时生效

# IM 交互通道：微信（通过龙虾）
[channel:wechat]
enabled=false
openclaw_channel=openclaw-weixin
openclaw_account=
openclaw_target=

# IM 交互通道：飞书（通过龙虾）
[channel:feishu-openclaw]
enabled=false
openclaw_channel=feishu
openclaw_account=
openclaw_target=

# ===== 龙虾模式 Agent 配置 =====
[openclaw]
# 子 Agent（推荐）或 main
agent_mode=sub
agent_name=cc-monitor
agent_model=
